name: Bug Report
description: Report a bug or unexpected behaviour in Zenith for macOS
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "e.g. 1.0.0 — visible in the About tab of the Dashboard"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "e.g. macOS 15 Sequoia 15.3.2"
    validations:
      required: true

  - type: dropdown
    id: arch
    attributes:
      label: Architecture
      options:
        - Apple Silicon (arm64)
        - Intel (x86_64)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Click …
        3. See error
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output from the Dashboard's Log tab or the system console.
      render: text
    validations:
      required: false

  - type: textarea
    id: mtr_status
    attributes:
      label: MTR / mtr-packet status
      description: |
        If the issue is related to MTR or ping fallback, run the following and paste the output:
        ```
        which mtr && which mtr-packet
        ls -la $(which mtr-packet)
        mtr --version
        ```
      render: text
    validations:
      required: false
